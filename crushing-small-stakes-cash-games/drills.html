<script>
const allQuestions = [
  // --- PREFLOP DECISIONS ---
  {q:"From early position (UTG) at a 9-handed table, which hand should you FOLD?",opts:["Pocket Aces (AA)","Ace-King suited (AKs)","Queen-Jack offsuit (QJo)","Pocket Tens (TT)"],ans:2,hint:"UTG means tight ranges and dominated situations -- which hand flops top pair with a weak kicker too often?",ex:"QJo is basically unplayable from early position. The hand is easily dominated and you will be forced to play it out of position against tight ranges. From UTG, your range should be something like 6-10% of hands -- strong pairs, AK, AQ, and a few suited broadway hands. QJo should be folded."},
  {q:"You are on the Button and everyone folds to you. The players in the blinds are both tight and straightforward. What is your approximate raising range?",opts:["About 20% of hands -- only strong pairs and big aces","About 30-35% of hands -- pairs, big aces, and suited broadways","About 50-60% of hands -- almost any playable hand has value","About 10% of hands -- the blinds play well postflop"],ans:2,hint:"Button is the best position and tight players fold frequently -- how wide can you open profitably?",ex:"From the Button against tight blinds, you should raise roughly 50-60% of hands. Position is enormously valuable, and tight players in the blinds will fold often and play straightforwardly when they do call. You should be stealing the blinds with a very wide range -- suited connectors, weak aces, one-gap hands, and more."},
  {q:"You raise to 3 big blinds from the Cutoff with Pocket Jacks. A tight-aggressive player 3-bets to 10 big blinds from the Button. You are 100 big blinds deep. What is the best play?",opts:["4-bet to 25 big blinds to find out where you stand","Fold -- Jacks are a trap hand against 3-bets","Call and plan to check-call down on most boards","Shove all-in immediately"],ans:2,hint:"If you 4-bet, which hands does a TAG continue with -- the ones that dominate you or the ones you dominate?",ex:"Calling the 3-bet is best with JJ here. If you 4-bet, a TAG will fold all the hands JJ dominates (AQ, AJ, KQ, TT, 99, 88) and only continue with hands that crush you. By calling, you keep his entire 3-bet range in, giving you roughly 60% equity against it. Then check-call down on boards like T-7-3 where you have him demolished. 4-betting benefits your opponent by allowing him to play perfectly."},
  {q:"The GTO big blind strategy versus a Button open says you should primarily do which of the following?",opts:["Call wide and rarely 3-bet","3-bet frequently with both value hands and marginal suited hands as bluffs; call much less often than most players think","Fold anything weaker than top 20% of hands","Call with any two suited cards"],ans:1,hint:"BTN has a very wide range -- what balance of 3-bets and calls does GTO recommend from the BB?",ex:"Versus a Button open, you should 3-bet much more frequently than most players do. The GTO strategy 3-bets all the best hands for value, but also includes marginal suited hands like T7s, J8s, T6s as semi-bluffs. Most players dramatically under-3-bet in this spot. Also, hands like A2o and 76o should fold, while suited garbage can often call. The key insight: call less and 3-bet more."},
  {q:"A tight passive player limps under the gun at a full ring table. What does their limping range most likely look like?",opts:["Any two cards -- they like to see flops cheaply","A wide range including suited connectors and small pairs","A tight range of medium-strong hands they are not willing to raise","A trapping range of only AA, KK, QQ looking to limp-reraise"],ans:2,hint:"Tight passive players limp hands they want to play but don't want to raise -- think medium-strength.",ex:"Tight passive players limp with medium-strong hands they consider 'playable but not raiseable' -- things like KJo, QTo, small pairs, suited aces. Some of the very tightest players will limp-reraise with AA/KK, but their general limping range is a tight medium-strength range. This means when they do bet postflop, they usually have something, and you can profitably raise their limps in position with a wide range."},
  {q:"You are facing a tricky limper from early position (he sometimes limps premium hands). Which hands should you RAISE over him, and which should you LIMP BEHIND?",opts:["Raise all your good hands; limp nothing","Raise big offsuit aces like AJo and KTo (they block his AA/KK and are fine to fold if 3-bet); limp behind with suited connectors and pairs","Limp behind with all hands to keep the pot small","Raise only AA and KK to maximize value"],ans:1,hint:"Tricky limpers can have premiums -- which hands can absorb a reraise and which hands cannot?",ex:"Against a tricky limper, raise with offsuit big-card hands like AJo, ATo, KTo -- they block him from having aces/kings, and if he 3-bets you, you can easily fold since they play poorly in a big pot. Limp behind with hands like suited connectors, small pairs, and suited aces that want to flop well. If the pot gets big preflop through a 3-bet, those hands lose their implied odds value."},
  {q:"You face a pot-sized raise from the small blind after four players limped. You are in the big blind with Pocket Sixes. The raiser has 100 big blinds. What do you need in approximate implied odds to profitably call a set-mining raise?",opts:["2-to-1 (pot odds are enough)","5-to-1 implied odds","10-to-1 implied odds (risk 1 unit to win at least 10 units)","No implied odds needed; always fold small pairs to large raises"],ans:2,hint:"You flop a set about 1 in 8.5 times -- how much do you need to potentially win to make the call worthwhile?",ex:"To profitably set mine, you need approximately 10-to-1 implied odds. You will flop a set roughly 1 in 8.5 times (about 12%). If you call 18 big blinds and only win a 100 BB stack half the times you flop a set, you will not profit. The formula: you need to potentially win about 10 times your call amount from your opponent's stack when you hit. If effective stacks are too shallow, fold and wait for a better spot."},

  // --- EXPLOITATIVE ADJUSTMENTS ---
  {q:"Against a calling station (a player who calls with a very wide range and almost never folds), what is the most important adjustment?",opts:["Bluff them off weak hands with large bets","Value bet thinner -- bet three streets with hands like middle pair top kicker","Bet for information to find out where you stand","Slow play all strong hands to induce bluffs"],ans:1,hint:"Calling stations won't fold -- so bluffing is worthless. What action extracts maximum value?",ex:"Against calling stations, your primary weapon is thin value betting. They will call with ace-high, bottom pair, and all sorts of weak holdings. You should bet three streets with hands like second pair, top pair medium kicker -- hands you might check back against a thinking player. Bluffing is almost always terrible against them. You also want to bet smaller on the river so they can call with their entire weak range, rather than forcing them to fold marginal hands with a big bet."},
  {q:"A tight passive player bets into you on the turn on a board of K-10-5-2. You have top pair (K-Q). They are known to only bet the turn when they have top pair top kicker or better. What is the correct play?",opts:["Call -- top pair is still good","Raise -- you need to protect your hand","Fold -- their turn betting range has you crushed","Check behind since we are out of position"],ans:2,hint:"A tight passive player only bets turns with very strong hands -- does your K-Q beat most of that range?",ex:"This is a straightforward fold. If you know your opponent's turn betting range is top pair top kicker or better, your K-Q (top pair decent kicker) is behind most of their range. They can have AK, KK, TT, 55, 22, 5-5 -- all beat you. Being able to make this disciplined fold with top pair against a tight passive player who is announcing strength is a huge skill. Against a loose player, you might call, but against a tight passive player who never bluffs, fold."},
  {q:"A loose aggressive player (LAG) raises preflop and continuation bets the flop. You called the flop with a flush draw. What is the worst play on the turn if a blank falls?",opts:["Check-raise the turn as a semi-bluff","Call another bet to see the river","Check and plan to fold to most turn bets","Float the flop and bet when checked to on the turn"],ans:2,hint:"You have 9 outs and fold equity -- what is the worst thing you can do with this equity?",ex:"Check-folding to a turn bet with a flush draw is the worst play. You have 9 outs to the flush (roughly 18% equity), which is often enough equity plus fold equity to make a profitable move. Against a LAG, check-raising the turn is actually a great play because turn raises look extremely strong. The LAG will often fold hands like AK that have you dominated but have no pair. At minimum, call if getting the right odds -- do not just surrender."},
  {q:"You are playing a maniac who raises and re-raises frequently. You call with J-10 suited and the flop comes J-7-4 rainbow. You have top pair. The maniac bets. What is the best play?",opts:["Raise to protect your hand -- draws could hurt you","Call and check-call the turn and river","Fold -- maniacs always have it","Call the flop, then lead out on the turn"],ans:1,hint:"Raising folds out his bluffs and keeps only hands that beat you -- which line extracts more from his wide range?",ex:"Call and plan to check-call down. Against a maniac, raising with top pair is a mistake because you force him to fold his entire bluffing range and only continue with hands that have you beat. By calling, you look weak and invite him to continue bluffing with hands like A5, Q9, or random over-cards. On the river, even if a scary card comes, you still need to be good 25-26% of the time to call a pot-sized bet, and maniacs will be bluffing that often or more with their wide range."},
  {q:"You play against a tight-aggressive player who raises preflop with a solid range. On the flop, they bet. On the turn, they check. What does their check typically signal?",opts:["They always have a strong hand when checking the turn","Their range is now mostly marginal made hands and bluffs -- this is a great spot to bet","They are setting a trap with the nuts","They have a monster flush draw"],ans:1,hint:"TAGs play fit-or-fold -- when they check the turn after betting the flop, what does their range look like?",ex:"A TAG who bets the flop and then checks the turn is typically giving up on the hand or has a medium-strength hand. Their turn-checking range is mostly marginal made hands (middle pair, weak top pair) and total air. This is one of the defining weaknesses of tight-aggressive players: they play very straightforward on later streets. If checked to on the turn, bet a wide range, because their checking range is mostly not strong enough to continue."},
  {q:"You are at a table with several loose aggressive players on your left. What is the best seat-selection adjustment?",opts:["Stay put -- position relative to LAGs does not matter much","Get on the table change list and move to a seat to their LEFT so you have position on them","Move to a seat directly to their LEFT so they act before you","Request to be moved to a different table if you cannot get position on them"],ans:2,hint:"Money flows left in poker -- you want position on the LAG, so where should they sit relative to you?",ex:"You want the LAGs to be on your RIGHT, so they act before you. Money flows left in poker -- the guy on your left has position on you, which is a major disadvantage. If you have aggressive players on your left constantly 3-betting you, you will struggle to win. Get on the table change list immediately. Ideally, sit directly to the LEFT of the weak player, so they are the one on your right and you have position every hand."},

  // --- C-BET DECISIONS ---
  {q:"You raise preflop with A-K and get one caller (a loose passive player) in the big blind. The flop comes 9-6-2 rainbow (completely missing you). What is the correct action?",opts:["Always check -- you missed the flop","Bet about half pot as a continuation bet -- loose passive players fold often","Bet full pot to make it maximally expensive for them","Bet only if the board has a high card that connects with your range"],ans:1,hint:"Passive players fold often without a pair -- does the board texture or your hand strength matter more here?",ex:"Continuation bet the flop frequently against passive players, especially heads-up. Even though you missed, your A-K still has 6 outs to top pair and a 9-6-2 rainbow is a board where a loose passive player will fold a lot -- they often need a pair to continue. A half-pot bet forces them to put in money with hands like 7-8 or 5-4 that have very little equity. Passive players tend not to fight back with nothing."},
  {q:"In a 3-bet pot, what bet sizing adjustment should you make on the flop compared to a single-raised pot?",opts:["Bet larger -- 3-bet pots deserve bigger bets","Bet the same size regardless of pot size","Bet smaller -- the pot is already large, and smaller bets get stacks in by the river","Check more often since you already showed strength preflop"],ans:2,hint:"The pot is already large in a 3-bet pot -- do you need a big bet to get stacks in by the river?",ex:"In 3-bet pots, use smaller continuation bet sizes. The pot is already big, so you do not need to bet large to get stacks in by the river. Betting pot or close to it in a 3-bet pot would make your bets too large relative to stack sizes, pricing out calls and limiting action. A bet of around 33% to 50% of the pot in a 3-bet pot is often correct, compared to 50-66% in a single-raised pot."},
  {q:"You raised preflop and bet the flop. The turn is a card that is good for your range (your bluffs now have top pair). What should your turn strategy look like?",opts:["Check most of your range to protect your checking range","Bet frequently and at a relatively small size since you have a range advantage","Bet infrequently and large -- only your best hands deserve to bet","Check-raise any bet to maximize value"],ans:1,hint:"A range-advantage turn card means your average hand beats theirs -- how often and how big should you bet?",ex:"When a turn card is good for your range -- for example, an ace falls and you raised preflop with lots of ace-x hands -- bet frequently and relatively small. You have a range advantage, meaning your average hand is significantly better than your opponent's. A small bet forces them to defend with their entire weak range and builds the pot efficiently. This is the opposite of when a bad turn card falls, where you would check a lot and bet infrequently with only the best hands."},
  {q:"You raised preflop, bet the flop, and your opponent called. The turn is a terrible card for your range (pairing a card your opponent likely holds). What is the correct turn strategy?",opts:["Bet the same amount as the flop -- stay consistent","Check most hands; only bet your absolute best hands and strongest draws","Bet bigger to represent a strong hand","Check everything and fold to any bet"],ans:1,hint:"A bad turn for your range means opponent's average hand improved -- how does that change your betting strategy?",ex:"On a bad turn card for your range, check most of your hands. When you do bet, bet with only your best hands and draws, and use a larger sizing (polarized). For example, on J-6-2 where a 7 falls (better for the caller who check-called 7-8 type hands), the preflop raiser bets only about 36% of the time and uses a large size like 125% pot. Betting wide on a bad turn just gets you raised off your bluffs and called by hands that beat you."},
  {q:"You call a preflop raise in position. On the flop, the preflop raiser continuation bets. You have a backdoor flush draw and two overcards but no made hand. What is the best play?",opts:["Fold -- you have nothing","Call -- you have backdoor equity and can bet the turn if checked to","Raise immediately to represent a strong hand","Check behind on the turn no matter what"],ans:1,hint:"You have position and a plan for the turn -- what can you do if they check after betting the flop?",ex:"Call with backdoor equity plus overcards when in position. You have enough raw equity to continue, and more importantly, you have a plan: if your opponent checks the turn, you can often bet as if you made your hand. Your range includes many top-pair hands (your two overcards hit the board a lot), so when checked to on the turn, you can bet wide for value and as a bluff. This is the core floating strategy. Do NOT over-fold the flop -- folding 60%+ of the time is exploitable."},

  // --- FLOATING AND BLUFFING ---
  {q:"What is the PRIMARY requirement for a profitable float (calling a bet with a plan to bet the turn)?",opts:["You need to have a draw or two overcards at minimum","You need to be in position AND your opponent must be likely to check the turn when they miss or are weak","You must have the nut flush draw","You need to be out of position to make your bet more credible"],ans:1,hint:"A float only works when you can bet the turn -- what two conditions must exist for that?",ex:"The core requirement for a float is being IN POSITION and having a read that your opponent will check the turn when they have a weak or marginal hand. If they always fire two barrels regardless, the float fails -- you will just be calling two streets with nothing. But if they bet the flop with a wide range and then give up on the turn, you can call the flop and bet the turn when checked to. Tight-aggressive players who play 'fit or fold' on the turn are the ideal float targets."},
  {q:"When is bluffing a TERRIBLE idea against a specific opponent type?",opts:["Against tight-passive players who play straightforward","Against tight-aggressive players who continuation bet a lot","Against calling stations who call down with any pair or better","Against loose-aggressive players who sometimes fold to aggression"],ans:2,hint:"Which opponent type calls down with bottom pair and ace-high, making bluffing pointless?",ex:"Never bluff calling stations. They will call you down with bottom pair, ace-high, and worse. Bluffing them is, as Jonathan Little says, 'an extraordinarily bad idea.' When a calling station calls your flop bet and your turn bet, they are not folding the river. Every bluff dollar is a lost dollar. Instead, value bet them thinly with three streets of betting -- they will pay off with their weak hands."},
  {q:"On the river, you bet for value and get raised. You have top pair. Most players at this table never bluff-raise the river. What should you do?",opts:["Call -- top pair should always call river raises","Raise again -- they might be bluffing","Fold -- their raise almost always means a better hand at small stakes","Call only if pot odds justify it"],ans:2,hint:"Small-stakes players almost never bluff-raise the river -- what does a raise almost always mean?",ex:"Folding is almost always correct when a tight player raises your value bet on the river at small stakes. Betting for value with the intention of folding if raised is one of the biggest winning plays in small stakes cash games. Players at these limits almost never bluff-raise the river -- when they raise, they have the flush, the full house, or the nuts. Do not call off large amounts with hands like top pair that lose to all of their raising range."},
  {q:"Which board texture is BEST for bluffing a tight-aggressive player who continuation bet the flop?",opts:["A board with no cards above 9 (small card board)","A turn card that is an ace or another high card that improves your bluffing range","A paired board on the turn","A flush-completing card on the turn"],ans:1,hint:"Which turn card makes your bluffing range stronger while weakening a TAG's c-betting range?",ex:"The best bluff opportunities against tight-aggressive players come on turn cards that are good for your range. If an ace falls on the turn, a TAG will often check because their range contains fewer ace-x hands proportionally. Meanwhile, you can represent many more ace-x hands in your preflop calling range. Bluffing on cards that are 'scary' for your opponent's range (overcards, board pairers that hit your calling range, straight-completing cards) is the foundation of good turn and river play."},

  // --- POT ODDS AND IMPLIED ODDS ---
  {q:"You are on the river. The pot is $100 and your opponent bets $50 (a half-pot bet). How often must you be right when calling to break even?",opts:["25% of the time","33% of the time","40% of the time","50% of the time"],ans:0,hint:"You call $50 into a $100 pot -- what fraction of the total pot you risk is your call?",ex:"Required equity = call / (pot after call) = 50 / (100 + 50 + 50) = 50/200 = 25%. A half-pot bet gives you pot odds of 3-to-1, so you need to win 25% of the time. For comparison: a pot-sized bet ($100 into a $100 pot) gives 2-to-1 odds, requiring 33% equity. A one-third pot bet gives 4-to-1 odds, requiring 20% equity. Understanding these breakeven percentages is fundamental for river call/fold decisions."},
  {q:"You have a flush draw on the flop with 9 outs. Approximately what is your probability of completing the flush by the river (with two cards to come)?",opts:["About 9%","About 18%","About 35%","About 50%"],ans:2,hint:"Multiply outs by 4 with two cards to come -- what does 9 x 4 give you?",ex:"The quick rule of thumb: multiply your outs by 4 when there are two cards to come. With 9 flush outs, 9 x 4 = 36%, approximately 35%. This means roughly one-third of the time you will complete your flush. If you only have one card to come (turn to river), multiply by 2: 9 x 2 = 18%. These approximations are good enough for table use without a calculator."},
  {q:"You have 8-7 suited on a board of 9-6-2 with two of your suit. You have an open-ended straight draw AND a flush draw. Approximately how many outs do you have?",opts:["8 outs (straight draw only)","9 outs (flush draw only)","15 outs (but some overlap)","21 outs"],ans:2,hint:"8 straight outs + 9 flush outs -- but two cards do double duty, so subtract the overlap.",ex:"You have 8 outs to the straight (four 5s and four 10s) and 9 outs to the flush. However, the 5 and 10 of your suit are counted in both. So total unique outs = 8 + 9 - 2 = 15. This is a monster draw with roughly 15 x 4 = 60% equity on the flop against most made hands. With 15 outs, you are often a FAVORITE against a pair. This is one of the strongest draws in hold'em."},
  {q:"You are considering set mining by calling a raise with Pocket Fives. The raiser has 80 big blinds behind (after the raise). You must call 3 big blinds. Does this call have good implied odds?",opts:["Yes -- you have 80 big blinds to win which is much more than your call","No -- you need roughly 10x your call in stacks, and 80 is not enough compared to a 3 BB call... wait, 3 x 10 = 30, which is well under 80","Yes -- the 10:1 rule is satisfied since 80 > 30","Both B and C are correct"],ans:3,hint:"10:1 implied odds rule -- you need 10x your call in potential winnings from their stack.",ex:"The implied odds check: you need to be able to win approximately 10 times your call from your opponent's stack. You are calling 3 big blinds, so you need to be able to win at least 30 big blinds from their stack. They have 80 big blinds, so yes, this satisfies the requirement. The call is profitable from an implied odds standpoint, assuming you can get stacks in a significant portion of the time you flop a set. Both B and C describe the same correct conclusion."},

  // --- BET SIZING ---
  {q:"Why should you raise to the SAME size preflop regardless of your hand?",opts:["To confuse opponents with randomness","To make your range balanced and prevent opponents from exploiting your bet sizing as a tell","Smaller raises with bluffs and bigger raises with value are standard in good poker","Only weak players vary their sizing"],ans:1,hint:"If you raise bigger with strong hands, what can observant opponents deduce about your range?",ex:"Consistent preflop sizing is fundamental. If you raise bigger with AA and smaller with 72o, observant opponents will pick up the tell within a session. Preflop is the street everyone sees, giving opponents the most hands of data. By raising the same amount always (usually 3 big blinds, or 3-4 BB from early position), you prevent any read from your sizing. On the river, you can vary sizes since players see far fewer big river spots per session."},
  {q:"You want to extract thin value from a calling station on the river who will call any pair. Your hand is two pair. The pot is $60. What is the best bet sizing?",opts:["$60 (pot size) -- maximize value against weak players","$30-40 (half pot or slightly less) -- they call wider with smaller bets","$10 (tiny bet) -- always bet tiny for value","$80 (overbet) -- they will call anything"],ans:1,hint:"A calling station calls almost everything -- what size gets called by the widest range of weak hands?",ex:"Bet smaller to get called by a wider range. Calling stations tend to call smaller bets with literally any pair or ace-high. A $30-40 bet will get called by their entire weak range. A $60 pot-sized bet will also probably get called, but some players -- even calling stations -- become uncomfortable with large bets. The key insight: you do not need a big bet to get value; you need to extract money across the entire range of weak hands they hold. Bet sizing should be based on what the opponent will call with weaker hands, not what looks biggest."},
  {q:"Against a tight-aggressive player on the river, you bet $40 for value and they go all-in for $200. The pot before their raise is $140. How much do you need to call, and roughly how often must you be right?",opts:["Call $160, need to be right about 22% of the time","Call $160, need to be right about 40% of the time","Call $200, need to be right about 33% of the time","Call $160, need to be right about 50% of the time"],ans:0,hint:"You bet $40, they jam to $200 -- calculate how much you call and divide by the total pot if you call.",ex:"You bet $40 into a $100 pot ($140 total). They shove to $200 total. You already put in $40, so you call $160 more. The pot if you call = $140 + $200 + $160 = $500 total. Your required equity = $160 / $500 = 32%. But at small stakes, since TAGs almost never bluff-raise rivers, your actual win rate here is probably well under 32%. Easy fold. This is the 'bet for value, fold to a raise' play that is one of the most profitable moves in small stakes games."},
  {q:"Which bet sizing principle is most important when deciding how much to bet on the flop as the preflop raiser?",opts:["Always bet exactly half the pot, every time","Adjust based on board texture -- wet boards may warrant larger bets to deny equity, dry boards can use smaller bets","Bet as large as possible to get stacks in","Always bet two-thirds of the pot as a standard"],ans:1,hint:"Wet boards have equity to deny, dry boards do not -- how does that change what size you should use?",ex:"Bet sizing should be based on the board texture and what you are trying to accomplish. On a very wet, draw-heavy board (like 9-8-7 with two suits), bet larger to make draws pay. On a dry, disconnected board (like K-7-2 rainbow), a small bet works fine since there is little the caller can do to hurt you. In 3-bet pots, always bet smaller (1/3 to 1/2 pot) since stacks are shallower relative to pot. Mechanical sizing is one of the most common small stakes leaks."},

  // --- HAND READING SCENARIOS ---
  {q:"A tight passive player raises preflop, bets the flop and turn on a board of K-10-5-2. You have K-J (top pair, second kicker). The tight passive player is known to only bet turns with top pair top kicker or better. What should you do?",opts:["Call both streets -- top pair is good","Raise the turn -- you need to protect your equity","Fold the turn -- your hand is behind most of their range","Call the flop, fold the turn"],ans:3,hint:"On the flop you might be ahead, but when a tight passive fires the turn, their range has you dominated.",ex:"Call the flop bet (you could be ahead or have top pair with potential), but fold the turn when they fire again. A tight passive player betting both the flop AND turn has an extremely strong range: AK, sets, two pair. Your K-J cannot beat AK (they have you dominated) and loses badly to sets and two pair. Against a loose player, you might call the turn with pot odds. Against a tight passive player who never bets turns without the goods, folding top pair is the correct, high-discipline play."},
  {q:"A loose passive player raises preflop, bets the flop, and then CHECKS the turn. What does their check likely mean?",opts:["They definitely have a monster and are slowplaying","They usually have a marginal hand or are giving up -- the check typically means no queen/ace/strong hand","They are always setting a trap on the turn","Their check means they have exactly middle pair"],ans:1,hint:"A loose passive player bet the flop then checked the turn -- they rarely slowplay, so what does the check signal?",ex:"Loose passive players who check the turn after betting the flop usually have a medium-strength hand or missed their draw. As Jonathan Little says: 'Against most loose passive players, when they check back the turn, they do not have a queen.' They probably have a middling pair, a weak draw, or total air. This is a great spot to bet the river for value with any hand that beats their checking range, or to make a small bluff if they tend to fold the river."},
  {q:"You raise preflop and a calling station calls from the big blind. Flop is 9-8-5 (two spades). You have 9-8 offsuit (two pair). Calling station checks. What is your plan for the hand?",opts:["Check back -- protect your hand from draws with deception","Bet all three streets for value -- they will call down with any pair or draw","Check the flop, bet the turn and river","Only bet if they check again on the turn"],ans:1,hint:"Calling station + two pair on a draw-heavy board -- your goal is to charge draws and get paid by weak hands.",ex:"Bet all three streets for value against a calling station. With two pair on a draw-heavy board, you want to build the pot and make draws pay. A calling station will call you down with any pair, any draw, and sometimes ace-high. Your concern is not that they fold -- it is that they hit their draw. Charge them on every street. If a spade comes and they lead out big, you can reassess, but your default is to bet, bet, bet for value."},
  {q:"You have Pocket Aces on a board of Q-J-10 with two hearts. A loose aggressive player check-raises the flop. What is the WRONG response?",opts:["Call the check-raise and see what develops on the turn","Fold -- the board is too dangerous for aces","Re-raise all in to charge draws maximally","Call, then call down if they bet turn and river"],ans:2,hint:"On Q-J-10 with a flush draw, they could have a straight or strong draw -- re-raising folds out their bluffs.",ex:"Re-raising all-in here is the wrong play. On Q-J-10 with a flush draw, your opponent could have K-9 (straight), or a pair plus draw that has significant equity. By re-raising, you may also fold out hands you are beating (like top pair with a heart draw). Calling keeps their entire range in -- the bluffs will continue bluffing, and you will extract more money from the weaker parts of their range. If they have the straight already, you cannot avoid losing; but the best you can do is call and see what they do next."},

  // --- BANKROLL MANAGEMENT ---
  {q:"Jonathan Little recommends a minimum bankroll for a serious live cash game player who cannot easily reload (treating poker as a profession). What is that minimum?",opts:["10 buy-ins (1,000 big blinds)","20 buy-ins (2,000 big blinds)","30 buy-ins (3,000 big blinds)","5 buy-ins (500 big blinds)"],ans:2,hint:"Downswings of 10+ buy-ins are normal -- how many buy-ins do you need to survive without going broke?",ex:"The minimum recommended bankroll is 3,000 big blinds (about 30 buy-ins). Downswings of 10+ buy-ins are normal and will happen to every winning player. With only 2-5 buy-ins, a routine downswing wipes you out. For professionals who cannot afford to go broke, keep even more -- ideally 5,000 big blinds or more plus six months of living expenses set aside. Treating bankroll management as optional is one of the main reasons skilled players go broke."},
  {q:"You are a winning 1-2 player and considering moving up. What is the main financial reason to move up to 2-5 as quickly as you are properly bankrolled for it?",opts:["There are much worse players at 2-5","The rake at 1-2 is often the same dollar amount as 2-5, meaning it takes a much larger percentage of your winrate at 1-2","2-5 games run longer hours","2-5 players are tighter and easier to bluff"],ans:1,hint:"If rake is $8/hour at both limits, which stake makes that rake a smaller percentage of your winrate?",ex:"The rake is the key financial reason. If a casino charges $5-12 per hour or per pot in rake at both 1-2 and 2-5, the rake at 1-2 might consume most of your winnings. A strong winning rate at 1-2 might be $10-15/hour before rake, and if rake costs $8-12/hour, your take-home is nearly zero. At 2-5, the same absolute rake is a much smaller percentage of pots and winrate. Moving up as soon as bankrolled makes economic sense."},

  // --- BONUS ADVANCED TOPICS ---
  {q:"In game selection, why is it more important to sit to the LEFT of the weakest player than to the right of the toughest player?",opts:["Position relative to weak players does not matter much","Money flows left in poker -- sitting to the left of a weak player means you have position on them every hand, allowing you to win the most from them","Sitting to the right of a tough player is always worse because they act after you","The big blind position matters more than seat relative to player types"],ans:1,hint:"You want to see their action before yours -- should the weak player be to your left or your right?",ex:"Money flows left in poker. The player to your right acts before you on every postflop street, giving you position. If a weak player is to your right, you get to see what they do before you act -- you can call their weak bets with any hand, fold to their big bets when you have nothing, and raise their checks when you have a hand. Conversely, if a good player is on your left (you are to their right), they exploit your every weakness. Seat selection is a major edge that many players undervalue."},
  {q:"What is the best strategy against a maniac who is 3-betting and putting pressure on the table?",opts:["3-bet them back constantly with any two cards","Tighten up slightly, call their raises with hands that flop well, and then check-call down when you make top pair or better","Avoid all pots with them","Only play AA and KK against them"],ans:1,hint:"Maniacs have very wide ranges and bluff constantly -- what kind of hands should you call them with?",ex:"The winning play against maniacs is to call their raises with hands that flop well (suited connectors, pairs, suited aces), then play fit-or-fold and check-call when you make something decent. Do not ram and jam with top pair against them -- check-call down and let them bluff. Do not try to out-bluff a maniac. Widen your calling range slightly from the default since their 3-bet range is so wide, but do not get into a re-raising war with junk hands. The maniac IS allowed to have the nuts sometimes."},
  {q:"You have been playing tightly for the first two hours of a session. Based on your table image, what exploitative adjustment should you make?",opts:["Continue playing tightly since that is your style","Increase your bluffing frequency -- your opponents believe you are tight and will fold to your aggression more often","Start 4-betting all your good hands to maximize value","Switch tables to start fresh with a new image"],ans:1,hint:"Opponents think you only bet with strong hands -- how can that perception help your bluffing?",ex:"Your tight image is an asset. Opponents who think you are a nit will fold to your continuation bets, turn barrels, and river bets at a much higher frequency than they would against a loose player. This is exactly when you should add bluffs into your range -- 3-bet bluff some hands preflop, barrel scary turn cards, and run river bluffs on cards that complete your represented draws. Your opponents are giving you a discount on bluffs. Take advantage of it."},
];

var originalQuestions = allQuestions.slice();
let questions,current,score,missed,answered;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function shuffleArray(arr){for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=arr[i];arr[i]=arr[j];arr[j]=tmp;}}

function updateReviewBtn(){var btn=document.getElementById('reviewMissedBtn');if(!btn)return;btn.textContent='Review Missed ('+missed.length+')';if(missed.length>0){btn.disabled=false;btn.style.opacity='1';}else{btn.disabled=true;btn.style.opacity='0.4';}}

function shuffleRestart(){var pool=originalQuestions.slice();shuffleArray(pool);questions=pool;current=0;score=0;missed=[];answered=false;updateReviewBtn();document.getElementById('results').style.display='none';document.getElementById('question-area').style.display='block';document.getElementById('next-btn').style.display='none';showQ();}

function reviewMissed(){if(missed.length===0)return;var pool=missed.slice();shuffleArray(pool);questions=pool;current=0;score=0;missed=[];answered=false;updateReviewBtn();document.getElementById('results').style.display='none';document.getElementById('question-area').style.display='block';document.getElementById('next-btn').style.display='none';showQ();}

function restart(){questions=shuffle([...originalQuestions]);current=0;score=0;missed=[];answered=false;updateReviewBtn();document.getElementById('results').style.display='none';document.getElementById('question-area').style.display='block';document.getElementById('next-btn').style.display='none';showQ()}
function showQ(){
  if(current>=questions.length){showResults();return}
  answered=false;
  const q=questions[current];
  const pct=((current)/questions.length*100).toFixed(0);
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('score-display').textContent='Question '+(current+1)+' of '+questions.length+'  |  Score: '+score;
  let html='<div class="q-number">Question '+(current+1)+'</div><div class="q-text">'+q.q+'</div>';
  if(q.hint){html+='<button class="hint-btn" onclick="toggleHint()">Show Hint (H)</button>';html+='<div class="hint" id="hint-box">'+q.hint+'</div>';}
  q.opts.forEach(function(o,i){html+='<button class="option" data-idx="'+i+'" onclick="pick('+i+')"><span class="opt-key">'+(i+1)+'.</span>'+o+'</button>';});
  document.getElementById('question-area').innerHTML=html;
  document.getElementById('explanation').classList.remove('visible');
  document.getElementById('explanation').textContent='';
  document.getElementById('next-btn').style.display='none';
  if(typeof renderMathInElement==='function'){renderMathInElement(document.getElementById('question-area'),{throwOnError:false,delimiters:[{left:'\\(',right:'\\)',display:false},{left:'\\[',right:'\\]',display:true}]});}
}
function pick(idx){
  if(answered)return;answered=true;
  const q=questions[current];
  const btns=document.querySelectorAll('.option');
  btns.forEach(function(b){
    b.classList.add('disabled');
    const bi=parseInt(b.dataset.idx);
    if(bi===q.ans)b.classList.add(bi===idx?'selected-correct':'show-correct');
    else if(bi===idx)b.classList.add('selected-wrong');
  });
  if(idx===q.ans)score++;
  else missed.push({q:q.q,your:q.opts[idx],correct:q.opts[q.ans],ex:q.ex});
  updateReviewBtn();
  document.getElementById('explanation').textContent=q.ex;
  document.getElementById('explanation').classList.add('visible');
  document.getElementById('next-btn').style.display='block';
  document.getElementById('score-display').textContent='Question '+(current+1)+' of '+questions.length+'  |  Score: '+score;
}
function toggleHint(){var hb=document.getElementById('hint-box');if(hb)hb.classList.toggle('show');}
function advance(){if(!answered)return;current++;showQ()}
function showResults(){
  document.getElementById('question-area').style.display='none';
  document.getElementById('next-btn').style.display='none';
  document.getElementById('explanation').classList.remove('visible');
  document.getElementById('progress-fill').style.width='100%';
  const r=document.getElementById('results');r.style.display='block';
  document.getElementById('r-correct').textContent=score;
  document.getElementById('r-total').textContent=questions.length;
  document.getElementById('r-pct').textContent=(score/questions.length*100).toFixed(0)+'% correct';
  let rh='';
  if(missed.length===0)rh='<p>Perfect score -- nothing to review.</p>';
  else missed.forEach(function(m){rh+='<div class="review-item"><div class="ri-q">'+m.q+'</div><div class="ri-your">Your answer: '+m.your+'</div><div class="ri-correct">Correct: '+m.correct+'</div><div class="ri-explain">'+m.ex+'</div></div>';});
  document.getElementById('review-list').innerHTML=rh;
}
document.getElementById('next-btn').addEventListener('click',advance);
document.addEventListener('keydown',function(e){
  if(e.key===' '||e.key==='Enter'){e.preventDefault();if(answered)advance();}
  if(e.key==='r'||e.key==='R'){if(document.getElementById('results').style.display==='block')restart();}
  if(!answered&&e.key>='1'&&e.key<='4'){const i=parseInt(e.key)-1;const opts=document.querySelectorAll('.option');if(i<opts.length)pick(i);}
  if(e.key==='h'||e.key==='H'){toggleHint();}
});
restart();
</script>
</body>
</html>
