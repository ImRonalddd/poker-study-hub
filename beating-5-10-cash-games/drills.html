var current = 0, score = 0, answered = false;
var missed = [];
var qa = document.getElementById('question-area');
var exEl = document.getElementById('explanation');
var nextBtn = document.getElementById('next-btn');
var progFill = document.getElementById('progress-fill');
var scoreDisp = document.getElementById('score-display');
var resultsDiv = document.getElementById('results');

function showQuestion() {
  if (current >= allQuestions.length) { showResults(); return; }
  answered = false;
  var q = allQuestions[current];
  progFill.style.width = (current / allQuestions.length * 100) + '%';
  scoreDisp.textContent = 'Score: ' + score + ' / ' + current;

  var html = '<div class="q-number">Question ' + (current + 1) + ' of ' + allQuestions.length + '</div>';
  html += '<div class="q-text">' + q.q + '</div>';
  if (q.hint) {
    html += '<button class="hint-btn" onclick="toggleHint()">Show Hint (H)</button>';
    html += '<div class="hint" id="hint">' + q.hint + '</div>';
  }
  var keys = ['A', 'B', 'C', 'D'];
  for (var i = 0; i < q.opts.length; i++) {
    html += '<button class="option" data-idx="' + i + '" onclick="selectAnswer(' + i + ')">';
    html += '<span class="opt-key">' + keys[i] + '</span>' + q.opts[i];
    html += '</button>';
  }
  qa.innerHTML = html;
  exEl.className = ''; exEl.style.display = 'none';
  nextBtn.style.display = 'none';
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  var q = allQuestions[current];
  var btns = qa.querySelectorAll('.option');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.add('disabled');
    if (i === q.ans) btns[i].classList.add('show-correct');
  }
  if (idx === q.ans) {
    btns[idx].classList.add('selected-correct');
    score++;
  } else {
    btns[idx].classList.add('selected-wrong');
    missed.push({q: q.q, yours: q.opts[idx], correct: q.opts[q.ans], ex: q.ex});
  }
  var hintBtn = qa.querySelector('.hint-btn');
  if (hintBtn) hintBtn.style.display = 'none';
  exEl.innerHTML = q.ex;
  exEl.style.display = 'block';
  exEl.className = 'visible';
  nextBtn.style.display = 'block';
}

function nextQuestion() {
  current++;
  showQuestion();
}

function toggleHint() {
  var el = document.getElementById('hint');
  if (el) el.classList.toggle('show');
}

function showResults() {
  qa.style.display = 'none';
  exEl.style.display = 'none';
  nextBtn.style.display = 'none';
  progFill.style.width = '100%';
  scoreDisp.textContent = '';
  resultsDiv.style.display = 'block';
  document.getElementById('r-correct').textContent = score;
  document.getElementById('r-total').textContent = allQuestions.length;
  var pct = Math.round(score / allQuestions.length * 100);
  document.getElementById('r-pct').textContent = pct + '% correct';
  var reviewHtml = '';
  for (var i = 0; i < missed.length; i++) {
    var m = missed[i];
    reviewHtml += '<div class="review-item">';
    reviewHtml += '<div class="ri-q">' + m.q + '</div>';
    reviewHtml += '<div class="ri-your">Your answer: ' + m.yours + '</div>';
    reviewHtml += '<div class="ri-correct">Correct: ' + m.correct + '</div>';
    reviewHtml += '<div class="ri-explain">' + m.ex + '</div>';
    reviewHtml += '</div>';
  }
  if (missed.length === 0) reviewHtml = '<p>Perfect score!</p>';
  document.getElementById('review-list').innerHTML = reviewHtml;
}

function restart() {
  current = 0; score = 0; missed.length = 0;
  qa.style.display = 'block';
  resultsDiv.style.display = 'none';
  showQuestion();
}

document.addEventListener('keydown', function(e) {
  if (e.key >= '1' && e.key <= '4' && !answered) selectAnswer(parseInt(e.key) - 1);
  if ((e.key === ' ' || e.key === 'Enter') && answered) { e.preventDefault(); nextQuestion(); }
  if (e.key === 'h' || e.key === 'H') toggleHint();
  if (e.key === 'r' || e.key === 'R') { if (resultsDiv.style.display === 'block') restart(); }
});

nextBtn.addEventListener('click', nextQuestion);
showQuestion();
</script>
