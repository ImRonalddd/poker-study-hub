<style>
:root {
  --bg: #FFFFFF;
  --surface: #FFFFFF;
  --surface2: #F5F5F5;
  --accent: #000000;
  --text: #000000;
  --text-dim: #525252;
  --correct: #1a7a5e;
  --wrong: #b91c1c;
  --orange: #8B6914;
  --border: #000000;
  --border-light: #E5E5E5;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Source Serif 4', serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 20px 60px;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  font-weight: 900;
  text-align: center;
  margin-bottom: 4px;
}

.subtitle {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  text-align: center;
  margin-bottom: 24px;
}

.progress-wrap {
  width: 100%;
  max-width: 680px;
  margin-bottom: 32px;
}

.progress-bar {
  width: 100%;
  height: 6px;
  background: var(--border-light);
  border-radius: 0px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--accent);
  transition: width 0.3s ease;
  width: 0%;
}

.progress-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--text-dim);
  margin-top: 6px;
  display: flex;
  justify-content: space-between;
}

.card {
  width: 100%;
  max-width: 680px;
  border: 2px solid var(--border);
  border-radius: 0px;
  padding: 32px;
  min-height: 320px;
  display: flex;
  flex-direction: column;
}

.tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  margin-bottom: 16px;
}

.question-text {
  font-size: 1.15rem;
  font-weight: 600;
  margin-bottom: 24px;
  flex-shrink: 0;
}

.options { list-style: none; flex: 1; }

.option-btn {
  display: block;
  width: 100%;
  text-align: left;
  padding: 12px 16px;
  margin-bottom: 8px;
  border: 1px solid var(--border-light);
  border-radius: 0px;
  background: var(--surface);
  font-family: 'Source Serif 4', serif;
  font-size: 1rem;
  cursor: pointer;
  transition: border-color 0.15s;
  line-height: 1.5;
}

.option-btn:hover:not(.locked) {
  border-color: var(--accent);
}

.option-btn .hotkey {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-right: 8px;
}

.option-btn.correct-choice {
  border-color: var(--correct);
  background: #f0fdf4;
}

.option-btn.wrong-choice {
  border-color: var(--wrong);
  background: #fef2f2;
}

.option-btn.show-correct {
  border-color: var(--correct);
  border-width: 2px;
}

.option-btn.locked { cursor: default; }

.fib-wrap {
  display: flex;
  gap: 12px;
  align-items: center;
  flex: 1;
}

.fib-input {
  flex: 1;
  padding: 12px 16px;
  border: 1px solid var(--border-light);
  border-radius: 0px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 1rem;
  outline: none;
}

.fib-input:focus { border-color: var(--accent); }

.fib-submit {
  padding: 12px 24px;
  border: 2px solid var(--accent);
  border-radius: 0px;
  background: var(--accent);
  color: var(--bg);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.feedback {
  margin-top: 16px;
  padding: 16px;
  border: 1px solid var(--border-light);
  border-radius: 0px;
  display: none;
}

.feedback.show { display: block; }

.feedback-verdict {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 6px;
  font-weight: 500;
}

.feedback-verdict.is-correct { color: var(--correct); }
.feedback-verdict.is-wrong { color: var(--wrong); }

.feedback-explanation {
  font-size: 0.95rem;
  color: var(--text-dim);
}

.hint-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--text-dim);
  background: none;
  border: 1px solid var(--border-light);
  padding: 4px 10px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-top: 12px;
}

.hint-text {
  font-size: 0.9rem;
  color: var(--orange);
  font-style: italic;
  margin-top: 8px;
  display: none;
}

.hint-text.show { display: block; }

.nav-row {
  margin-top: 20px;
  display: flex;
  gap: 12px;
  justify-content: flex-end;
  width: 100%;
}

.nav-btn {
  padding: 10px 28px;
  border: 2px solid var(--accent);
  border-radius: 0px;
  background: var(--bg);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  transition: background 0.15s, color 0.15s;
}

.nav-btn:hover {
  background: var(--accent);
  color: var(--bg);
}

.nav-btn:disabled {
  opacity: 0.3;
  cursor: default;
}

.summary {
  width: 100%;
  max-width: 680px;
  text-align: center;
}

.summary h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.8rem;
  margin-bottom: 8px;
}

.score-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.4rem;
  margin-bottom: 24px;
}

.score-text .num-correct { color: var(--correct); }
.score-text .num-wrong { color: var(--wrong); }

.summary-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

.hotkeys {
  width: 100%;
  max-width: 680px;
  margin-top: 32px;
  padding-top: 16px;
  border-top: 1px solid var(--border-light);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-dim);
  text-align: center;
  letter-spacing: 0.02em;
}

.hotkeys kbd {
  background: var(--surface2);
  padding: 2px 6px;
  border: 1px solid var(--border-light);
  border-radius: 0px;
  font-family: inherit;
}
</style>

    hint: "The 7-2 game adds ~12 perceived bluff combos to your range at all times.",
    explanation: "The 7-2 game adds ~12 perceived bluff combos to your range. Opponents will hero-call more thinking you could have 7-2. This means you should use BIGGER value bet sizes with strong hands -- your aces, sets, and top two pair get paid off more because opponents can't let you win the 7-2 bounty."
  },
  // --- Stand-Up Game ---
  {
    tag: "Stand-Up Game", type: "mc",
    text: "In a stand-up game with 7 players still standing, how should you conceptualize the game?",
    options: ["Each standing player puts ~1 BB pseudo-ante in every pot", "Play your normal strategy -- the side game doesn't matter", "Only play premium hands to avoid the penalty", "Go all-in pre-flop every hand to win quickly"],
    answer: 0,
    hint: "Think about the stand-up penalty as extra money in the pot.",
    explanation: "Think of each standing player as putting a pseudo-ante of ~1 BB in every pot. This means there's extra value in winning pots, so you should see more flops with wider ranges. Even weak suited hands (K2s) become profitable calls from the small blind. As players sit down, this effective ante shrinks."
  },
  {
    tag: "Stand-Up Game", type: "mc",
    text: "You're one of the last two standing in the stand-up game. You hold AQo in early position. Villain 4-bets you. The last-standing penalty is substantial (imagine 200 chips). What should you do?",
    options: ["5-bet all-in -- AQo crushes villain's wide range", "Fold -- AQo can't handle a 4-bet", "Flat call and play post-flop", "Fold unless you have AKs+"],
    answer: 0,
    hint: "When only two remain, how wide is villain trying to win?",
    explanation: "When two players remain, both are massively incentivized to win pots. Villain's 4-bet range is extremely wide (AJo, ATs, A9s, A8s, etc.) because they're also desperate to avoid the penalty. AQo dominates this range heavily -- it's a clear all-in."
  },
  // --- Live to Online Transition ---
  {
    tag: "Live to Online", type: "mc",
    text: "You normally play 2/5 live. You want to start playing online. Which stakes should you start at?",
    options: ["Move down -- online 2/5 is much tougher than live 2/5", "Same stakes -- 2/5 is 2/5", "Move up -- online players are tighter and easier to bluff", "Play the smallest stakes available"],
    answer: 0,
    hint: "Who populates online 2/5 games vs live 2/5 games?",
    explanation: "Online 2/5 is populated by professional grinders who track data, study extensively, and play for a living. Live 2/5 has far more recreational players. Always move down when transitioning to online. The skill gap at equivalent stakes is enormous."
  },
];
</script>

<script>
// ============================================================
// ENGINE
// ============================================================
let cur = 0, score = 0, answered = Array(QUESTIONS.length).fill(false);

function render() {
  const q = QUESTIONS[cur];
  const area = document.getElementById('cardArea');
  document.getElementById('progressFill').style.width = ((cur) / QUESTIONS.length * 100) + '%';
  document.getElementById('progressLabel').textContent = 'Question ' + (cur + 1) + ' / ' + QUESTIONS.length;
  document.getElementById('scoreLabel').textContent = score + ' correct';

  let html = '<div class="tag">' + q.tag + '</div>';
  html += '<div class="question-text">' + q.text + '</div>';

  if (q.type === 'mc') {
    html += '<ul class="options">';
    const keys = ['1','2','3','4'];
    q.options.forEach((o, i) => {
      html += '<button class="option-btn" data-idx="' + i + '"><span class="hotkey">' + keys[i] + '</span>' + o + '</button>';
    });
    html += '</ul>';
  } else if (q.type === 'tf') {
    html += '<ul class="options">';
    html += '<button class="option-btn" data-idx="0"><span class="hotkey">1</span>True</button>';
    html += '<button class="option-btn" data-idx="1"><span class="hotkey">2</span>False</button>';
    html += '</ul>';
  } else if (q.type === 'fib') {
    html += '<div class="fib-wrap"><input class="fib-input" id="fibIn" placeholder="Type your answer..." autocomplete="off"><button class="fib-submit" id="fibBtn">Submit</button></div>';
  }

  html += '<button class="hint-btn" id="hintBtn">Hint</button>';
  html += '<div class="hint-text" id="hintText">' + q.hint + '</div>';
  html += '<div class="feedback" id="fb"><div class="feedback-verdict" id="fbVerdict"></div><div class="feedback-explanation" id="fbExpl"></div></div>';
  html += '<div class="nav-row"><button class="nav-btn" id="prevBtn" ' + (cur === 0 ? 'disabled' : '') + '>Prev</button><button class="nav-btn" id="nextBtn">Next</button></div>';

  area.innerHTML = html;

  document.getElementById('hintBtn').onclick = () => document.getElementById('hintText').classList.toggle('show');
  document.getElementById('prevBtn').onclick = () => { if (cur > 0) { cur--; render(); } };
  document.getElementById('nextBtn').onclick = () => next();

  if (q.type === 'mc' || q.type === 'tf') {
    area.querySelectorAll('.option-btn').forEach(btn => {
      btn.onclick = () => judge(parseInt(btn.dataset.idx));
    });
  } else if (q.type === 'fib') {
    const fibIn = document.getElementById('fibIn');
    const fibBtn = document.getElementById('fibBtn');
    fibBtn.onclick = () => judgeFib(fibIn.value.trim());
    fibIn.addEventListener('keydown', e => { if (e.key === 'Enter') judgeFib(fibIn.value.trim()); });
  }
}

function judge(idx) {
  const q = QUESTIONS[cur];
  const btns = document.querySelectorAll('.option-btn');
  const correctIdx = q.type === 'tf' ? (q.answer ? 0 : 1) : q.answer;
  if (answered[cur]) return;
  answered[cur] = true;
  btns.forEach(b => b.classList.add('locked'));
  if (idx === correctIdx) {
    btns[idx].classList.add('correct-choice');
    score++;
    showFeedback(true, q.explanation);
  } else {
    btns[idx].classList.add('wrong-choice');
    btns[correctIdx].classList.add('show-correct');
    showFeedback(false, q.explanation);
  }
  document.getElementById('scoreLabel').textContent = score + ' correct';
}

function judgeFib(val) {
  const q = QUESTIONS[cur];
  if (answered[cur]) return;
  answered[cur] = true;
  const correct = q.answer.some(a => val.toLowerCase() === a.toLowerCase());
  if (correct) { score++; }
  const inp = document.getElementById('fibIn');
  inp.style.borderColor = correct ? 'var(--correct)' : 'var(--wrong)';
  inp.disabled = true;
  document.getElementById('fibBtn').disabled = true;
  showFeedback(correct, q.explanation);
  document.getElementById('scoreLabel').textContent = score + ' correct';
}

function showFeedback(correct, text) {
  const fb = document.getElementById('fb');
  const v = document.getElementById('fbVerdict');
  const e = document.getElementById('fbExpl');
  v.textContent = correct ? 'Correct' : 'Incorrect';
  v.className = 'feedback-verdict ' + (correct ? 'is-correct' : 'is-wrong');
  e.textContent = text;
  fb.classList.add('show');
}

function next() {
  if (cur < QUESTIONS.length - 1) { cur++; render(); }
  else { showSummary(); }
}

function showSummary() {
  const area = document.getElementById('cardArea');
  const wrong = QUESTIONS.length - score;
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressLabel').textContent = 'Complete';
  area.innerHTML = '<div class="summary"><h2>Drill Complete</h2>' +
    '<div class="score-text"><span class="num-correct">' + score + ' correct</span> / <span class="num-wrong">' + wrong + ' wrong</span></div>' +
    '<div class="summary-actions"><button class="nav-btn" onclick="restart()">Restart</button>' +
    '<a class="nav-btn" href="index.html" style="text-decoration:none;text-align:center;">Back to Chapter</a></div></div>';
}

function restart() {
  cur = 0; score = 0; answered = Array(QUESTIONS.length).fill(false); render();
}

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  const q = QUESTIONS[cur];
  if ((q.type === 'mc' || q.type === 'tf') && !answered[cur]) {
    const maxKey = q.type === 'tf' ? 2 : q.options.length;
    const num = parseInt(e.key);
    if (num >= 1 && num <= maxKey) judge(num - 1);
  }
  if (e.key === ' ') { e.preventDefault(); next(); }
  if (e.key === 'h' || e.key === 'H') { const h = document.getElementById('hintBtn'); if (h) h.click(); }
  if (e.key === 'r' || e.key === 'R') restart();
});

render();
</script>

</body>
