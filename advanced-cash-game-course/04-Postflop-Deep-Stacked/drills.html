<style>
:root {
  --bg: #FFFFFF;
  --surface: #FFFFFF;
  --surface2: #F5F5F5;
  --accent: #000000;
  --text: #000000;
  --text-dim: #525252;
  --correct: #1a7a5e;
  --wrong: #b91c1c;
  --orange: #8B6914;
  --border: #000000;
  --border-light: #E5E5E5;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Source Serif 4', serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 20px 60px;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  font-weight: 900;
  text-align: center;
  margin-bottom: 4px;
}

.subtitle {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  text-align: center;
  margin-bottom: 24px;
}

/* Progress bar */
.progress-wrap {
  width: 100%;
  max-width: 680px;
  margin-bottom: 32px;
}

.progress-bar {
  width: 100%;
  height: 6px;
  background: var(--border-light);
  border-radius: 0px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--accent);
  transition: width 0.3s ease;
  width: 0%;
}

.progress-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--text-dim);
  margin-top: 6px;
  display: flex;
  justify-content: space-between;
}

/* Card */
.card {
  width: 100%;
  max-width: 680px;
  border: 2px solid var(--border);
  border-radius: 0px;
  padding: 32px;
  min-height: 320px;
  display: flex;
  flex-direction: column;
}

.tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  margin-bottom: 16px;
}

.question-text {
  font-size: 1.15rem;
  font-weight: 600;
  margin-bottom: 24px;
  flex-shrink: 0;
}

/* Options */
.options { list-style: none; flex: 1; }

.option-btn {
  display: block;
  width: 100%;
  text-align: left;
  padding: 12px 16px;
  margin-bottom: 8px;
  border: 1px solid var(--border-light);
  border-radius: 0px;
  background: var(--surface);
  font-family: 'Source Serif 4', serif;
  font-size: 1rem;
  cursor: pointer;
  transition: border-color 0.15s;
  line-height: 1.5;
}

.option-btn:hover:not(.locked) {
  border-color: var(--accent);
}

.option-btn .hotkey {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-right: 8px;
}

.option-btn.correct-choice {
  border-color: var(--correct);
  background: #f0fdf4;
}

.option-btn.wrong-choice {
  border-color: var(--wrong);
  background: #fef2f2;
}

.option-btn.show-correct {
  border-color: var(--correct);
  border-width: 2px;
}

.option-btn.locked { cursor: default; }

/* FIB */
.fib-wrap {
  display: flex;
  gap: 12px;
  align-items: center;
  flex: 1;
}

.fib-input {
  flex: 1;
  padding: 12px 16px;
  border: 1px solid var(--border-light);
  border-radius: 0px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 1rem;
  outline: none;
}

.fib-input:focus { border-color: var(--accent); }

.fib-submit {
  padding: 12px 24px;
  border: 2px solid var(--accent);
  border-radius: 0px;
  background: var(--accent);
  color: var(--bg);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* Feedback */
.feedback {
  margin-top: 16px;
  padding: 16px;
  border: 1px solid var(--border-light);
  border-radius: 0px;
  display: none;
}

.feedback.show { display: block; }

.feedback-verdict {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 6px;
  font-weight: 500;
}

.feedback-verdict.is-correct { color: var(--correct); }
.feedback-verdict.is-wrong { color: var(--wrong); }

.feedback-explanation {
  font-size: 0.95rem;
  color: var(--text-dim);
}

.hint-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--text-dim);
  background: none;
  border: 1px solid var(--border-light);
  padding: 4px 10px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-top: 12px;
}

.hint-text {
  font-size: 0.9rem;
  color: var(--orange);
  font-style: italic;
  margin-top: 8px;
  display: none;
}

.hint-text.show { display: block; }

/* Navigation */
.nav-row {
  margin-top: 20px;
  display: flex;
  gap: 12px;
  justify-content: flex-end;
  width: 100%;
}

.nav-btn {
  padding: 10px 28px;
  border: 2px solid var(--accent);
  border-radius: 0px;
  background: var(--bg);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  transition: background 0.15s, color 0.15s;
}

.nav-btn:hover {
  background: var(--accent);
  color: var(--bg);
}

.nav-btn:disabled {
  opacity: 0.3;
  cursor: default;
}

/* Summary */
.summary {
  width: 100%;
  max-width: 680px;
  text-align: center;
}

.summary h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.8rem;
  margin-bottom: 8px;
}

.score-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.4rem;
  margin-bottom: 24px;
}

.score-text .num-correct { color: var(--correct); }
.score-text .num-wrong { color: var(--wrong); }

.summary-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

/* Hotkey legend */
.hotkeys {
  width: 100%;
  max-width: 680px;
  margin-top: 32px;
  padding-top: 16px;
  border-top: 1px solid var(--border-light);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-dim);
  text-align: center;
  letter-spacing: 0.02em;
}

.hotkeys kbd {
  background: var(--surface2);
  padding: 2px 6px;
  border: 1px solid var(--border-light);
  border-radius: 0px;
  font-family: inherit;
}
</style>

// ============================================================
// APP STATE
// ============================================================
let questions = [];
let current = 0;
let score = 0;
let answered = false;
let missed = [];
let reviewMode = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function init() {
  questions = shuffle(QUESTIONS);
  current = 0;
  score = 0;
  answered = false;
  missed = [];
  reviewMode = false;
  render();
}

function renderMath() {
  if (typeof renderMathInElement === 'function') {
    renderMathInElement(document.getElementById('cardArea'), {
      delimiters: [
        {left: '\\(', right: '\\)', display: false},
        {left: '\\[', right: '\\]', display: true}
      ],
      throwOnError: false
    });
  }
}

function updateProgress() {
  const total = questions.length;
  const pct = total > 0 ? ((current) / total) * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent =
    `Question ${Math.min(current + 1, total)} / ${total}` + (reviewMode ? ' (Review)' : '');
  document.getElementById('scoreLabel').textContent = `${score} correct`;
}

function render() {
  updateProgress();
  if (current >= questions.length) {
    renderSummary();
    return;
  }
  const q = questions[current];
  const card = document.getElementById('cardArea');

  if (q.type === 'mc') renderMC(q, card);
  else if (q.type === 'tf') renderTF(q, card);
  else if (q.type === 'fib') renderFIB(q, card);

  answered = false;
  setTimeout(renderMath, 50);
}

function renderMC(q, card) {
  const shuffledOpts = q._shuffled || (() => {
    const indices = q.options.map((_, i) => i);
    const shuffled = shuffle(indices);
    q._shuffled = shuffled;
    return shuffled;
  })();

  let html = `<div class="tag">${q.tag}</div>`;
  html += `<div class="question-text">${q.text}</div>`;
  html += `<ul class="options">`;
  shuffledOpts.forEach((origIdx, displayIdx) => {
    html += `<button class="option-btn" data-orig="${origIdx}" data-display="${displayIdx}">
      <span class="hotkey">${displayIdx + 1}</span>${q.options[origIdx]}</button>`;
  });
  html += `</ul>`;
  html += feedbackHTML(q);
  card.innerHTML = html;

  card.querySelectorAll('.option-btn').forEach(btn => {
    btn.addEventListener('click', () => handleMCAnswer(q, parseInt(btn.dataset.orig)));
  });
  card.querySelector('.hint-btn').addEventListener('click', toggleHint);
}

function renderTF(q, card) {
  let html = `<div class="tag">${q.tag}</div>`;
  html += `<div class="question-text">${q.text}</div>`;
  html += `<ul class="options">`;
  html += `<button class="option-btn" data-val="true"><span class="hotkey">1</span>True</button>`;
  html += `<button class="option-btn" data-val="false"><span class="hotkey">2</span>False</button>`;
  html += `</ul>`;
  html += feedbackHTML(q);
  card.innerHTML = html;

  card.querySelectorAll('.option-btn').forEach(btn => {
    btn.addEventListener('click', () => handleTFAnswer(q, btn.dataset.val === 'true'));
  });
  card.querySelector('.hint-btn').addEventListener('click', toggleHint);
}

function renderFIB(q, card) {
  let html = `<div class="tag">${q.tag}</div>`;
  html += `<div class="question-text">${q.text}</div>`;
  html += `<div class="fib-wrap">
    <input class="fib-input" type="text" placeholder="Type your answer..." id="fibInput">
    <button class="fib-submit" id="fibSubmit">Submit</button>
  </div>`;
  html += feedbackHTML(q);
  card.innerHTML = html;

  const input = document.getElementById('fibInput');
  const submit = document.getElementById('fibSubmit');
  submit.addEventListener('click', () => handleFIBAnswer(q, input.value));
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleFIBAnswer(q, input.value);
  });
  input.focus();
  card.querySelector('.hint-btn').addEventListener('click', toggleHint);
}

function feedbackHTML(q) {
  return `
    <button class="hint-btn">H -- Hint</button>
    <div class="hint-text" id="hintText">${q.hint}</div>
    <div class="feedback" id="feedback">
      <div class="feedback-verdict" id="verdict"></div>
      <div class="feedback-explanation" id="explanation"></div>
      <div class="nav-row">
        <button class="nav-btn" id="nextBtn" onclick="advance()">Space -- Next</button>
      </div>
    </div>`;
}

function handleMCAnswer(q, origIdx) {
  if (answered) return;
  answered = true;
  const correct = origIdx === q.answer;
  if (correct) score++;
  else missed.push({...q, _shuffled: undefined});

  const card = document.getElementById('cardArea');
  card.querySelectorAll('.option-btn').forEach(btn => {
    btn.classList.add('locked');
    const oi = parseInt(btn.dataset.orig);
    if (oi === origIdx && !correct) btn.classList.add('wrong-choice');
    if (oi === q.answer) btn.classList.add(correct ? 'correct-choice' : 'show-correct');
  });
  showFeedback(correct, q.explanation);
}

function handleTFAnswer(q, val) {
  if (answered) return;
  answered = true;
  const correct = val === q.answer;
  if (correct) score++;
  else missed.push({...q});

  const card = document.getElementById('cardArea');
  card.querySelectorAll('.option-btn').forEach(btn => {
    btn.classList.add('locked');
    const bv = btn.dataset.val === 'true';
    if (bv === val && !correct) btn.classList.add('wrong-choice');
    if (bv === q.answer) btn.classList.add(correct ? 'correct-choice' : 'show-correct');
  });
  showFeedback(correct, q.explanation);
}

function handleFIBAnswer(q, val) {
  if (answered) return;
  answered = true;
  const trimmed = val.trim().replace(/[%$,]/g, '');
  const correct = q.answer.some(a => a.replace(/[%$,]/g, '') === trimmed);
  if (correct) score++;
  else missed.push({...q});

  const input = document.getElementById('fibInput');
  input.disabled = true;
  input.style.borderColor = correct ? 'var(--correct)' : 'var(--wrong)';
  document.getElementById('fibSubmit').disabled = true;
  showFeedback(correct, q.explanation + (correct ? '' : ` Accepted answers: ${q.answer[0]}`));
}

function showFeedback(correct, explanation) {
  const fb = document.getElementById('feedback');
  const verdict = document.getElementById('verdict');
  const expl = document.getElementById('explanation');
  verdict.textContent = correct ? 'Correct' : 'Incorrect';
  verdict.className = 'feedback-verdict ' + (correct ? 'is-correct' : 'is-wrong');
  expl.textContent = explanation;
  fb.classList.add('show');
  updateProgress();
}

function toggleHint() {
  const ht = document.getElementById('hintText');
  ht.classList.toggle('show');
}

function advance() {
  if (!answered && current < questions.length) return;
  current++;
  if (current < questions.length) {
    render();
  } else {
    renderSummary();
    updateProgress();
  }
}

function renderSummary() {
  const total = questions.length;
  const pct = Math.round((score / total) * 100);
  const card = document.getElementById('cardArea');

  let html = `<div class="summary">
    <h2>Drill Complete</h2>
    <div class="score-text">
      <span class="num-correct">${score}</span> / ${total} correct (${pct}%)
    </div>`;

  if (missed.length > 0) {
    html += `<p style="margin-bottom:20px;color:var(--text-dim)">You missed ${missed.length} question${missed.length > 1 ? 's' : ''}.</p>`;
  }

  html += `<div class="summary-actions">
    <button class="nav-btn" onclick="init()">R -- Restart All</button>`;
  if (missed.length > 0) {
    html += `<button class="nav-btn" onclick="startReview()">Review Missed</button>`;
  }
  html += `</div></div>`;
  card.innerHTML = html;
  document.getElementById('progressFill').style.width = '100%';
}

function startReview() {
  reviewMode = true;
  questions = shuffle(missed);
  missed = [];
  current = 0;
  score = 0;
  questions.forEach(q => { q._shuffled = undefined; });
  render();
}

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') {
    if (e.key === 'h' || e.key === 'H') return;
    if (e.key === 'Enter') return;
    return;
  }

  if (e.key === ' ' || e.code === 'Space') {
    e.preventDefault();
    if (answered) advance();
  }

  if (e.key === 'r' || e.key === 'R') {
    if (current >= questions.length || confirm('Restart the drill?')) init();
  }

  if (e.key === 'h' || e.key === 'H') {
    const hintBtn = document.querySelector('.hint-btn');
    if (hintBtn) toggleHint();
  }

  const q = current < questions.length ? questions[current] : null;
  if (!q || answered) return;

  if (q.type === 'mc') {
    const num = parseInt(e.key);
    if (num >= 1 && num <= 4) {
      const btns = document.querySelectorAll('.option-btn');
      if (btns[num - 1]) btns[num - 1].click();
    }
  }

  if (q.type === 'tf') {
    if (e.key === '1') document.querySelectorAll('.option-btn')[0]?.click();
    if (e.key === '2') document.querySelectorAll('.option-btn')[1]?.click();
  }
});

// ============================================================
// INIT
// ============================================================
init();
</script>
</body>
</html>
