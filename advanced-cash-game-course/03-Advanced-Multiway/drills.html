  {
    tag: "Examples",
    q: "You hold QQ with Q&spades; on J-7-5. You check-raise the flop, both call. Turn: A&spades; (flush completes). You should:",
    choices: [
      "Bet — you have a flush draw and overpair",
      "Check-call — you have outs",
      "Fold to any aggression — you're almost certainly beaten",
      "Go all-in as a semi-bluff"
    ],
    answer: 2,
    hint: "Both opponents called your check-raise. The flush completed. What do they have?",
    explain: "When both opponents call a check-raise and the flush completes, they almost certainly have made flushes or very strong hands. Your overpair + flush draw is often drawing dead (ace-high and king-high flushes beat yours). Fold to any aggression."
  },
  {
    tag: "Examples",
    q: "You hold A&spades;4&spades; and your flush draw missed on the river. You should NOT bluff because:",
    choices: [
      "You don't have enough chips",
      "The A&spades; blocks opponent's busted flush draws that would fold to your bet",
      "The board is too wet",
      "You should always bluff missed draws"
    ],
    answer: 1,
    hint: "What hands would fold to your river bet? And do you block those hands?",
    explain: "The A&spades; blocks the opponent's busted A&spades;x flush draws — the very hands that would auto-fold to your river bluff. If you block their folds, bluffing is terrible. Bluff instead with hands that DON'T block the folding range."
  },
  {
    tag: "Examples",
    q: "You hold AA on 8-3-2 multiway. You bet the flop, get called. Turn is a 6. You should:",
    choices: [
      "Bet big again for protection",
      "Check — aces are not vulnerable here and you can value bet the river",
      "Go all-in",
      "Bet small for value"
    ],
    answer: 1,
    hint: "Is AA really that vulnerable on 8-3-2-6? What's the opponent's range?",
    explain: "Check. AA on 8-3-2-6 is not very vulnerable (opponent needs specific sets or two pair). If you bet turn, opponent folds all worse hands. By checking, you protect your checking range and can value bet the river when an overcard comes or the opponent decides to bluff."
  }
];

let order=[], pos=0, score=0, missed=new Set(), answered=false, missedSet=new Set();
function startQuiz(mode){
  document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  pos=0; score=0; answered=false;
  if(mode==='missed'){
    order=[...missedSet];
    if(!order.length){order=[...Array(Q.length).keys()];}
  } else {
    order=[...Array(Q.length).keys()];
  }
  if(mode==='shuffle') for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];}
  missed=new Set();
  render();
}
function render(){
  if(pos>=order.length){showSummary();return;}
  answered=false;
  const qi=order[pos], d=Q[qi], area=document.getElementById('quiz-area');
  document.getElementById('progress').innerHTML=`Question ${pos+1} / ${order.length} &nbsp;|&nbsp; Score: <span class="score">${score}</span> &nbsp;|&nbsp; Missed: <span class="missed">${missed.size}</span>`;
  let h=`<div class="q-tag">${d.tag}</div><div class="q-text">${d.q}</div>`;
  h+=`<button class="hint-btn" onclick="document.getElementById('hint').classList.toggle('show')">Show Hint</button>`;
  h+=`<div class="hint" id="hint">${d.hint}</div>`;
  h+=`<div class="choices" id="choices">`;
  d.choices.forEach((c,i)=>{h+=`<button class="choice" data-i="${i}" onclick="pick(${qi},${i})">${c}</button>`;});
  h+=`</div><div id="fb"></div><div class="nav-row"><button class="btn" id="next-btn" style="display:none" onclick="pos++;render()">Next &rarr;</button></div>`;
  area.innerHTML=h;
}
function pick(qi,i){
  if(answered)return; answered=true;
  const d=Q[qi], btns=document.querySelectorAll('.choice');
  btns.forEach(b=>{b.disabled=true;const bi=+b.dataset.i;if(bi===d.answer)b.classList.add('correct');if(bi===i&&i!==d.answer)b.classList.add('wrong');});
  const ok=i===d.answer;
  if(ok)score++; else{missed.add(qi);missedSet.add(qi);}
  document.getElementById('fb').innerHTML=`<div class="feedback ${ok?'correct-fb':'wrong-fb'}"><div class="fb-label">${ok?'Correct':'Incorrect'}</div>${d.explain}</div>`;
  document.getElementById('next-btn').style.display='inline-block';
  document.getElementById('progress').innerHTML=`Question ${pos+1} / ${order.length} &nbsp;|&nbsp; Score: <span class="score">${score}</span> &nbsp;|&nbsp; Missed: <span class="missed">${missed.size}</span>`;
}
function showSummary(){
  const pct=Math.round(score/order.length*100);
  document.getElementById('quiz-area').innerHTML=`<div class="summary"><h2>Quiz Complete</h2><div class="stat">Score: ${score} / ${order.length} (${pct}%)</div><div class="stat">Missed: <span style="color:var(--wrong)">${missed.size}</span></div><br><button class="btn" onclick="startQuiz('all')">Restart All</button> <button class="btn" onclick="startQuiz('missed')">Review Missed</button></div>`;
  document.getElementById('progress').innerHTML='';
}
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  const k=e.key;
  if(k>='1'&&k<='5'&&!answered){const i=+k-1;const qi=order[pos];if(i<Q[qi].choices.length)pick(qi,i);}
  if((k==='n'||k==='N'||k==='Enter')&&answered){pos++;render();}
  if(k==='h'||k==='H'){const el=document.getElementById('hint');if(el)el.classList.toggle('show');}
  if(k==='r'||k==='R')startQuiz('all');
});
startQuiz('all');
</script>
