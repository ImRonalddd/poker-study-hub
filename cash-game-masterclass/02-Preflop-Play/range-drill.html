<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ch 2: Preflop Range Drill</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Serif+4:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap">
<style>
:root {
  --bg: #FFFFFF; --surface: #FFFFFF; --surface2: #F5F5F5;
  --accent: #000000; --text: #000000; --text-dim: #525252;
  --correct: #1a7a5e; --wrong: #b91c1c; --orange: #8B6914;
  --border: #000000; --border-light: #E5E5E5;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Source Serif 4',Georgia,serif; color:var(--text); background:var(--bg); line-height:1.6; }
.container { max-width:840px; margin:0 auto; padding:2rem 1.5rem; }
h1 { font-family:'Playfair Display',serif; font-size:1.8rem; margin-bottom:0.3rem; }
.subtitle { color:var(--text-dim); margin-bottom:1.5rem; }

.tabs { display:flex; gap:0; margin-bottom:1.5rem; border:1px solid var(--border); }
.tab { flex:1; text-align:center; padding:0.7rem; font-family:'JetBrains Mono',monospace; font-size:0.8rem; cursor:pointer; background:var(--surface2); border-right:1px solid var(--border); }
.tab:last-child { border-right:none; }
.tab.active { background:var(--accent); color:#fff; }

.scenario-row { display:flex; flex-wrap:wrap; gap:0.4rem; margin-bottom:1rem; }
.scenario-pill { font-family:'JetBrains Mono',monospace; font-size:0.7rem; padding:0.35rem 0.7rem; border:1px solid var(--border-light); cursor:pointer; background:var(--bg); }
.scenario-pill.active { background:var(--accent); color:#fff; border-color:var(--accent); }

.scenario-box { border:1px solid var(--border); padding:1rem 1.2rem; margin-bottom:1rem; }
.scenario-label { font-family:'JetBrains Mono',monospace; font-size:0.7rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-dim); margin-bottom:0.3rem; }
.scenario-text { font-size:1.1rem; font-weight:600; }
.scenario-detail { font-size:0.85rem; color:var(--text-dim); margin-top:0.2rem; }

.palette { display:flex; gap:0.5rem; margin-bottom:1rem; flex-wrap:wrap; align-items:center; }
.palette-label { font-family:'JetBrains Mono',monospace; font-size:0.7rem; color:var(--text-dim); text-transform:uppercase; margin-right:0.3rem; }
.palette-btn { font-family:'JetBrains Mono',monospace; font-size:0.75rem; padding:0.4rem 0.8rem; border:2px solid transparent; cursor:pointer; }
.palette-btn.active-paint { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent); }

.matrix-wrap { display:flex; justify-content:center; margin:0.8rem 0; }
.matrix { display:grid; grid-template-columns:repeat(13,1fr); gap:2px; max-width:560px; width:100%; user-select:none; }
.cell { aspect-ratio:1; display:flex; align-items:center; justify-content:center; font-family:'JetBrains Mono',monospace; font-size:0.6rem; font-weight:500; cursor:pointer; border:2px solid transparent; transition:background 0.08s, border-color 0.08s; }
.cell:hover:not(.revealed) { border-color:var(--accent); }

.legend { display:flex; gap:1rem; justify-content:center; margin:0.6rem 0; font-size:0.75rem; flex-wrap:wrap; }
.legend-item { display:flex; align-items:center; gap:0.3rem; }
.legend-swatch { width:12px; height:12px; display:inline-block; }

.score-box { text-align:center; padding:1rem; background:var(--surface2); margin:1rem 0; }
.score-big { font-family:'JetBrains Mono',monospace; font-size:2.5rem; font-weight:700; }
.score-label { font-size:0.85rem; color:var(--text-dim); }
.score-details { font-size:0.85rem; margin-top:0.5rem; color:var(--text-dim); }

.btn { font-family:'JetBrains Mono',monospace; font-size:0.8rem; padding:0.5rem 1rem; border:1px solid var(--accent); cursor:pointer; background:var(--bg); margin:0.3rem; }
.btn:hover { background:var(--surface2); }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:#333; }
.controls { text-align:center; margin:1rem 0; }

.session-score { font-family:'JetBrains Mono',monospace; font-size:0.8rem; color:var(--text-dim); text-align:center; margin-bottom:0.5rem; }

@media (max-width:600px) {
  .container { padding:1rem; }
  .cell { font-size:0.45rem; }
  h1 { font-size:1.4rem; }
  .tab { font-size:0.65rem; padding:0.5rem 0.3rem; }
}
</style>
</head>

<div class="container">
<h1>Preflop Range Drill</h1>
<p class="subtitle">Practice implementable preflop charts -- raise, call, or fold</p>

<div class="session-score" id="sessionScore"></div>

<div class="scenario-row" id="scenarioRow"></div>

<div class="scenario-box">

  <div class="scenario-detail" id="scenarioDetail"></div>

<div class="palette" id="palette"></div>

<div class="matrix-wrap">
<div class="matrix" id="matrix"></div>
</div>

<div class="legend" id="legend"></div>

<div id="scoreArea"></div>

<div class="controls" id="controls">
  <button class="btn" onclick="clearAll()">Clear All</button>
  <button class="btn btn-primary" onclick="checkRange()">Check Range</button>
</div>
</div>

var RANKS = ['A','K','Q','J','T','9','8','7','6','5','4','3','2'];
var currentSection = 'rfi';
var currentScenarioIdx = 0;
var checked = false;
var userActions = {};
var activeAction = null;
var isDragging = false;
var sessionResults = [];

function getHand(r, c) {
  if (r === c) return RANKS[r] + RANKS[c];
  if (c > r) return RANKS[r] + RANKS[c] + 's';
  return RANKS[c] + RANKS[r] + 'o';
}

function getScenario() {
  return SCENARIOS[currentSection][currentScenarioIdx];
}

function getActionSet() {
  var s = getScenario();
  if (s.actionSet) return SCENARIO_ACTIONS[s.actionSet];
  return SCENARIO_ACTIONS[currentSection];
}

function getCorrectAction(hand) {
  var s = getScenario();
  var data = PRESET_DATA[s.key];
  if (!data) return 'fold';
  return data[hand] || 'fold';
}

function switchSection(section) {
  currentSection = section;
  currentScenarioIdx = 0;
  document.querySelectorAll('.tab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.section === section);
  });
  loadScenario();
}

function selectScenario(idx) {
  currentScenarioIdx = idx;
  loadScenario();
}

function buildScenarioPills() {
  var row = document.getElementById('scenarioRow');
  var scenarios = SCENARIOS[currentSection];
  row.innerHTML = scenarios.map(function(s, i) {
    return '<div class="scenario-pill' + (i === currentScenarioIdx ? ' active' : '') + '" onclick="selectScenario(' + i + ')">' + s.label + '</div>';
  }).join('');
}

function buildPalette() {
  var pal = document.getElementById('palette');
  var actionKeys = getActionSet();
  pal.innerHTML = '<span class="palette-label">Paint:</span>' +
    actionKeys.map(function(key) {
      var a = ACTIONS[key];
      return '<div class="palette-btn' + (key === activeAction ? ' active-paint' : '') +
        '" style="background:' + a.color + ';color:' + a.textColor + '" onclick="setAction(' + "'" + key + "'" + ')">' + a.label + '</div>';
    }).join('');
}

function setAction(key) {
  activeAction = key;
  buildPalette();
}

function buildLegend() {
  var actionKeys = getActionSet();
  document.getElementById('legend').innerHTML = actionKeys.map(function(key) {
    var a = ACTIONS[key];
    return '<span class="legend-item"><span class="legend-swatch" style="background:' + a.color + '"></span> ' + a.label + '</span>';
  }).join('');
}

function buildMatrix() {
  var grid = document.getElementById('matrix');
  grid.innerHTML = '';
  userActions = {};
  checked = false;
  for (var r = 0; r < 13; r++) {
    for (var c = 0; c < 13; c++) {
      var cell = document.createElement('div');
      cell.className = 'cell';
      var hand = getHand(r, c);
      cell.textContent = hand;
      cell.dataset.hand = hand;
      cell.style.background = ACTIONS.fold.color;
      cell.style.color = ACTIONS.fold.textColor;

      (function(cl, h) {
        cl.addEventListener('mousedown', function(e) {
          e.preventDefault();
          if (checked) return;
          isDragging = true;
          applyAction(cl, h);
        });
        cl.addEventListener('mouseenter', function() {
          if (isDragging && !checked) applyAction(cl, h);
        });
        cl.addEventListener('touchstart', function(e) {
          e.preventDefault();
          if (checked) return;
          applyAction(cl, h);
        }, {passive:false});
      })(cell, hand);

      grid.appendChild(cell);
    }
  }
  document.addEventListener('mouseup', function() { isDragging = false; });
}

function applyAction(cell, hand) {
  if (!activeAction) return;
  userActions[hand] = activeAction;
  var a = ACTIONS[activeAction];
  cell.style.background = a.color;
  cell.style.color = a.textColor;
  cell.style.borderColor = 'transparent';
}

function clearAll() {
  if (checked) return;
  document.querySelectorAll('.cell').forEach(function(cell) {
    cell.style.background = ACTIONS.fold.color;
    cell.style.color = ACTIONS.fold.textColor;
    cell.style.borderColor = 'transparent';
  });
  userActions = {};
}

function loadScenario() {
  var s = getScenario();
  document.getElementById('scenarioText').textContent = s.title;
  document.getElementById('scenarioDetail').textContent = s.detail;
  document.getElementById('scoreArea').innerHTML = '';
  var actionKeys = getActionSet();
  activeAction = actionKeys[0];
  buildScenarioPills();
  buildPalette();
  buildLegend();
  buildMatrix();
  document.getElementById('controls').innerHTML =
    '<button class="btn" onclick="clearAll()">Clear All</button>' +
    '<button class="btn btn-primary" onclick="checkRange()">Check Range</button>';
  updateSessionDisplay();
}

function checkRange() {
  if (checked) return;
  checked = true;
  var correct = 0;
  var total = 169;

  document.querySelectorAll('.cell').forEach(function(cell) {
    cell.classList.add('revealed');
    var hand = cell.dataset.hand;
    var userAction = userActions[hand] || 'fold';
    var correctAction = getCorrectAction(hand);
    var isCorrect = userAction === correctAction;
    if (isCorrect) correct++;

    var ca = ACTIONS[correctAction];
    cell.style.background = ca.color;
    cell.style.color = ca.textColor;
    cell.style.borderColor = isCorrect ? '#1a7a5e' : '#b91c1c';
  });

  var pct = Math.round(100 * correct / total);
  sessionResults.push({ scenario: getScenario().label, section: currentSection, pct: pct });

  document.getElementById('scoreArea').innerHTML =
    '<div class="score-box">' +
    '<div class="score-big">' + pct + '%</div>' +
    '<div class="score-label">Accuracy</div>' +
    '<div class="score-details">' + correct + ' / ' + total + ' hands correct. Correct answers shown above (wrong cells outlined in red).</div>' +
    '</div>';

  document.getElementById('controls').innerHTML =
    '<button class="btn btn-primary" onclick="nextScenario()">Next Scenario</button>' +
    '<button class="btn" onclick="retryScenario()">Retry This One</button>';

  updateSessionDisplay();
}

function nextScenario() {
  var scenarios = SCENARIOS[currentSection];
  currentScenarioIdx = (currentScenarioIdx + 1) % scenarios.length;
  loadScenario();
}

function retryScenario() {
  loadScenario();
}

function updateSessionDisplay() {
  var el = document.getElementById('sessionScore');
  if (sessionResults.length === 0) { el.textContent = ''; return; }
  var avg = Math.round(sessionResults.reduce(function(s,r){ return s + r.pct; }, 0) / sessionResults.length);
  el.textContent = 'Session: ' + sessionResults.length + ' drills, ' + avg + '% avg accuracy';
}

loadScenario();
</script>
